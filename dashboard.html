<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Performance Review</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: rgba(20, 20, 20, 0.85); /* Glassmorphism base */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      -webkit-app-region: drag; /* Makes window draggable */
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
      border-radius: 16px;
    }

    #titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px 10px;
    }

    #titlebar h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
    }

    .close-btn {
      width: 12px;
      height: 12px;
      background: #ff5f56;
      border-radius: 50%;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: transform 0.2s;
    }
    .close-btn:hover {
      transform: scale(1.2);
    }

    #content {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      -webkit-app-region: no-drag;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 15px 20px;
      border-radius: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .stat-label {
      font-size: 16px;
      font-weight: 300;
      color: #ddd;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .blessing-val { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }
    .discipline-val { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

    .relationship-container {
      margin-top: auto;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 100%);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .relationship-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 5px;
    }

    .relationship-status {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(to right, #a8ff78, #78ffd6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: all 0.3s ease;
    }
    
    .status-toxic { background: linear-gradient(to right, #ff4b1f, #ff9068); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-rocky { background: linear-gradient(to right, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-roommates { background: linear-gradient(to right, #e0c3fc, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-professional { background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-besties { background: linear-gradient(to right, #fa709a, #fee140); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-angelic { background: linear-gradient(to right, #fdfbfb, #ebedee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  </style>
</head>
<body>
  <div id="titlebar">
    <h1>Hustle Stats</h1>
    <div class="close-btn" id="closeBtn"></div>
  </div>

  <div id="content">
    <div class="stat-row">
      <div class="stat-label">Total Blessings</div>
      <div class="stat-value blessing-val" id="blessingCount">0</div>
    </div>
    
    <div class="stat-row">
      <div class="stat-label">Total Disciplines</div>
      <div class="stat-value discipline-val" id="disciplineCount">0</div>
    </div>

    <div class="relationship-container">
      <div class="relationship-label">Current Relationship</div>
      <div class="relationship-status" id="relationshipStatus">Unknown</div>
    </div>
  </div>

  <script>
    const blessingEl = document.getElementById('blessingCount');
    const disciplineEl = document.getElementById('disciplineCount');
    const statusEl = document.getElementById('relationshipStatus');

    document.getElementById('closeBtn').addEventListener('click', () => {
      window.bridge.closeDashboard();
    });

    function updateUI(stats) {
      blessingEl.textContent = stats.blessings;
      disciplineEl.textContent = stats.disciplines;
      
      const b = stats.blessings;
      const d = stats.disciplines;
      
      let statusText = "New Hires";
      let statusClass = "status-roommates";

      if (b === 0 && d === 0) {
        statusText = "Acquaintances";
      } else if (d === 0) {
        statusText = "Angelic";
        statusClass = "status-angelic";
      } else if (b === 0) {
        statusText = "Toxic";
        statusClass = "status-toxic";
      } else if (b > d * 2) {
        statusText = "Besties";
        statusClass = "status-besties";
      } else if (d > b * 2) {
        statusText = "Toxic";
        statusClass = "status-toxic";
      } else if (b >= d) {
        statusText = "Professional";
        statusClass = "status-professional";
      } else {
        statusText = "Rocky";
        statusClass = "status-rocky";
      }

      statusEl.textContent = statusText;
      statusEl.className = 'relationship-status ' + statusClass;
    }

    // Load initial
    window.bridge.getStats().then(updateUI);

    // Listen for live updates
    window.bridge.onStatsUpdated(updateUI);
  </script>
</body>
</html>
